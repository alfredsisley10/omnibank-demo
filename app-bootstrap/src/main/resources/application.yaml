spring:
  application:
    name: omnibank
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:mem:omnibank;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: omnibank
    password: omnibank
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  flyway:
    enabled: true
    locations:
      - classpath:db/migration/ledger
      - classpath:db/migration/accounts_consumer
      - classpath:db/migration/lending_corporate
      - classpath:db/migration/payments_hub

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.omnibank: INFO

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/omnibank
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
